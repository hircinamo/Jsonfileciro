<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Prompt Manager Pro</title>
    <style>
        :root {
            --primary: #00796b;
            --danger: #e53935;
            --save: #1976d2;
            --bg: #f0f4f4;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
            position: relative;
        }

        /* Save Button - Top Right */
        .save-header-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: var(--save);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .upload-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px dashed var(--primary);
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #file-input { display: none; }

        .info-bar {
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .prompt-card {
            background: var(--white);
            margin-bottom: 15px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .line-number {
            background: #e0f2f1;
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .prompt-text {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .copy-btn { background: var(--primary); color: white; }
        .delete-btn { background: #ffebee; color: var(--danger); }

        .save-header-btn:active, .btn:active { transform: scale(0.95); }

        @media (max-width: 480px) {
            .save-header-btn { padding: 8px 14px; font-size: 13px; top: 10px; right: 10px; }
            h2 { font-size: 1.2rem; margin-top: 40px; }
        }
    </style>
</head>
<body>

<button class="save-header-btn" onclick="saveCurrentWork()">
    💾 Save Work
</button>

<div class="container">
    <h2>NFT Prompt Manager</h2>

    <div class="upload-card" onclick="document.getElementById('file-input').click()">
        <div style="font-size: 24px;">📁</div>
        <strong style="color: var(--primary);">নতুন JSON ফাইল আপলোড করুন</strong>
        <input type="file" id="file-input" accept=".json">
    </div>

    <div id="status-bar" class="info-bar" style="display: none;">
        <span id="count-text">মোট প্রম্পট: 0</span>
        <span id="file-name-text"></span>
    </div>

    <div id="display-area"></div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const displayArea = document.getElementById('display-area');
    const statusBar = document.getElementById('status-bar');
    const countText = document.getElementById('count-text');
    const fileNameText = document.getElementById('file-name-text');

    // পেজ লোড হওয়ার সাথে সাথে সেভ করা ডাটা চেক করবে
    window.onload = function() {
        const savedData = localStorage.getItem('nft_saved_work');
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            fileNameText.innerText = "Saved Progress";
            statusBar.style.display = 'flex';
            renderPromptsFromStorage(parsedData);
        }
    };

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        fileNameText.innerText = file.name;
        statusBar.style.display = 'flex';

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const json = JSON.parse(event.target.result);
                const dataArray = Array.isArray(json) ? json : (json.nft_prompts || []);
                renderPrompts(dataArray);
            } catch (err) {
                alert("সঠিক JSON ফাইল দিন।");
            }
        };
        reader.readAsText(file);
    });

    function renderPrompts(data) {
        displayArea.innerHTML = '';
        data.forEach((item, index) => {
            const promptText = item.prompt || "প্রম্পট পাওয়া যায়নি";
            createCard(promptText, index + 1);
        });
        updateCount();
    }

    function renderPromptsFromStorage(data) {
        displayArea.innerHTML = '';
        data.forEach((item) => {
            createCard(item.text, item.number);
        });
        updateCount();
    }

    function createCard(text, number) {
        const card = document.createElement('div');
        card.className = 'prompt-card';
        const uniqueId = 'card-' + Math.random().toString(36).substr(2, 9);
        card.id = uniqueId;

        card.innerHTML = `
            <div class="card-header">
                <span class="line-number">আইটেম #${number}</span>
            </div>
            <div class="prompt-text">${text}</div>
            <div class="actions">
                <button class="btn copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">
                    📋 Copy
                </button>
                <button class="btn delete-btn" onclick="deleteCard('${uniqueId}')">
                    🗑️ Delete
                </button>
            </div>
        `;
        displayArea.appendChild(card);
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ Copied!";
            btn.style.background = "#2e7d32";
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = "#00796b";
            }, 1000);
        });
    }

    function deleteCard(id) {
        const element = document.getElementById(id);
        if (element) {
            element.remove();
            updateCount();
        }
    }

    function updateCount() {
        const currentItems = displayArea.children.length;
        countText.innerText = `মোট প্রম্পট: ${currentItems}`;
        if (currentItems === 0 && !localStorage.getItem('nft_saved_work')) {
            statusBar.style.display = 'none';
        }
    }

    // কাজের অগ্রগতি সেভ করার ফাংশন
    function saveCurrentWork() {
        const cards = document.querySelectorAll('.prompt-card');
        const dataToSave = [];

        cards.forEach(card => {
            const number = card.querySelector('.line-number').innerText.replace('আইটেম #', '');
            const text = card.querySelector('.prompt-text').innerText;
            dataToSave.push({ number, text });
        });

        localStorage.setItem('nft_saved_work', JSON.stringify(dataToSave));
        
        const saveBtn = document.querySelector('.save-header-btn');
        saveBtn.innerText = "✅ Saved!";
        saveBtn.style.background = "#2e7d32";
        
        setTimeout(() => {
            saveBtn.innerHTML = "💾 Save Work";
            saveBtn.style.background = "#1976d2";
        }, 2000);
    }
</script>

</body>
</html>
